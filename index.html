        body {

            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 90%;

            padding: 20px;
        }
        h1 {
            font-size: 2.2rem;
            margin-bottom: 5px;
            letter-spacing: -1px;
        }
        p.subtitle {
            color: var(--subtext);
            margin-bottom: 40px;
            font-size: 1rem;
        }
        button#playBtn {
            background-color: var(--accent);
            color: #000;
            border: none;
            border-radius: 50%;
            width: 130px;
            height: 130px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.3);
            transition: all 0.2s ease;
        }
        button#playBtn:active {
            transform: scale(0.95);
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.4);
        }
        .status {
            margin-top: 30px;
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--subtext);
            height: 20px;
        }
        .transcript-box {
            margin-top: 30px;
            padding: 25px;
            background: #111;
            border-radius: 12px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            text-align: left;
            font-size: 1.2rem;
            line-height: 1.4;
            border: 1px solid #333;
        }
        .speaker-tag { font-size: 0.8rem; font-weight: bold; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px;}
        .speaker-Mateo { color: var(--mateo); }
        .speaker-Sofia { color: var(--sofia); }
        .es-text { font-weight: bold; color: var(--text); display: block; margin-bottom: 5px;}
        .en-text { font-size: 0.95rem; color: var(--subtext); display: block; }

</head>

        // Rehydrate the compressed bank to work with our exact logic
        const broadcastBank = rawBank.map(item => ({
            speaker: item.s === "M" ? "Mateo" : "Sofia",
            es: item.es,
            en: item.en
        }));

        const playBtn = document.getElementById('playBtn');
        const statusText = document.getElementById('statusText');
        const transcript = document.getElementById('transcript');
        let isPlaying = false;
        let speechSynth = window.speechSynthesis;
        let currentTimeout;
        
        // 10 seconds per block
        const SECONDS_PER_BLOCK = 10; 

        function getLiveConversationItem() {
            const currentUnixSeconds = Math.floor(Date.now() / 1000);
            const timeSlot = Math.floor(currentUnixSeconds / SECONDS_PER_BLOCK);
            
            // Loop sequentially through the 300 array items
            const index = timeSlot % broadcastBank.length;
            const secondsRemainingInBlock = SECONDS_PER_BLOCK - (currentUnixSeconds % SECONDS_PER_BLOCK);
            
            return {
                item: broadcastBank[index],
                delayUntilNext: secondsRemainingInBlock * 1000 
            };
        }

        function playRadioLoop() {
            if (!isPlaying) return;

            const { item, delayUntilNext } = getLiveConversationItem();
            
            transcript.innerHTML = `
                <div class="speaker-tag speaker-${item.speaker}">${item.speaker}</div>
                <span class="es-text">${item.es}</span>
                <span class="en-text">${item.en}</span>
            `;
            statusText.innerHTML = `<span style="color:var(--accent);">● LIVE</span> Broadcasting...`;

            const utterance = new SpeechSynthesisUtterance(item.es);
            utterance.rate = 0.75; 
            
            if (item.speaker === "Mateo") {
                utterance.pitch = 0.8;
            } else {
                utterance.pitch = 1.4;
            }
            
            const voices = speechSynth.getVoices();
            const esVoice = voices.find(v => v.lang.startsWith('es-') || v.lang.startsWith('es_'));
            if (esVoice) utterance.voice = esVoice;

            speechSynth.speak(utterance);

            currentTimeout = setTimeout(() => {
                if (isPlaying) playRadioLoop();
            }, delayUntilNext);
        }

        playBtn.addEventListener('click', () => {
            if (!isPlaying) {
                isPlaying = true;
                playBtn.innerText = "STOP";
                playBtn.style.backgroundColor = "#222";
                playBtn.style.color = "white";
                
                if (speechSynth.getVoices().length === 0) {
                    speechSynth.onvoiceschanged = playRadioLoop;
                } else {
                    playRadioLoop();
                }
            } else {
                isPlaying = false;
                playBtn.innerText = "TUNE IN";
                playBtn.style.backgroundColor = "var(--accent)";
                playBtn.style.color = "#000";
                statusText.innerText = "Station Offline";
                transcript.innerHTML = '<span style="color: #555; text-align: center; width: 100%;">Broadcast ended.</span>';
                
                speechSynth.cancel(); 
                clearTimeout(currentTimeout);
            }
        });
    </script>
